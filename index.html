<style>
:root{
  --bg-0:#0d1017;
  --bg-1:#161b24;
  --glass-fill: rgba(255,255,255,0.055);
  --glass-fill-strong: rgba(255,255,255,0.09);

  --glass-border-strong: rgba(255,255,255,0.18);
  --text-0:#f5f6f8;
  --text-1:#a9adb8;
  --text-2:#6b6f7a;
  --accent:#ff9f43;
  --accent-2:#4fc3f7;
  --accent-mag:#ff5470;
  --danger:#ff4d4f;
  --safe:#39d98a;
  --radius-lg:22px;
  --radius-md:14px;
  --radius-sm:9px;
  --font-base: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
.font-num{ font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
html,body{
  height:100%;
  margin:0;
  background:
    radial-gradient(circle at 15% 8%, rgba(255,159,67,0.07), transparent 45%),
    radial-gradient(circle at 85% 92%, rgba(79,195,247,0.06), transparent 50%),
    var(--bg-0);
  color:var(--text-0);
  font-family: var(--font-base);
  overflow:hidden;
}
#app{position:relative; width:100vw; height:100vh; height:100dvh;}

.view{
  position:absolute; inset:0;
  visibility:hidden;
  pointer-events:none;
}
.view.active{visibility:visible; pointer-events:auto;}

.glass-panel{
  background:var(--glass-fill);
  backdrop-filter: blur(28px) saturate(170%);
  -webkit-backdrop-filter: blur(28px) saturate(170%);
  border:1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
}

.tabbar{
  position:absolute;
  bottom:18px; left:18px;
  z-index:60;
  display:flex; flex-direction:column; gap:4px;
  padding:6px;
  border-radius:20px;
  background:rgba(20,22,28,0.55);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border:1px solid var(--glass-border-strong);
  box-shadow:0 10px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
}
.tab-btn{
  display:flex; flex-direction:row; align-items:center; gap:8px;
  padding:9px 10px;
  border-radius:14px;
  border:none;
  background:transparent;
  color:var(--text-2);
  font-family:var(--font-base);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition: color .25s ease, background .25s ease, transform .2s ease, padding .2s ease;
  -webkit-user-select:none; user-select:none;
  white-space:nowrap;
  overflow:hidden;
}
.tab-btn svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.7; transition:transform .3s ease; flex-shrink:0;}
.tab-btn .tab-label{
  max-width:70px;
  transition: max-width .25s ease, opacity .2s ease;
  opacity:1;
}
.tab-btn.active{
  color:var(--text-0);
  background:var(--glass-fill-strong);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 2px 10px rgba(0,0,0,0.25);
}
.tab-btn.active svg{transform:scale(1.05);}
.tab-btn:active{transform:scale(0.96);}

@media (max-width: 640px){
  .tabbar{ bottom:14px; left:14px; padding:5px; }
  .tab-btn{ padding:9px; }
  .tab-btn .tab-label{ max-width:0; opacity:0; }
}

.map-container{position:absolute; inset:0; z-index:1;}

.floating-panel{
  position:absolute;
  z-index:40;
  padding:16px;
}
.floating-panel.glass-panel{
  background:#0d0e12;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
  border:1px solid rgba(255,255,255,0.14);

.floating-panel.glass-panel .field-label{ color:rgba(255,255,255,0.6); }
.floating-panel.glass-panel .panel-title{ color:rgba(255,255,255,0.75); }
.panel-title{

label.field-label{

.btn:active{transform:scale(0.97);}

.row{display:flex; gap:8px;}

<script>
'use strict';

const DARK_STYLE = {
  version: 8,
  glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
  sources: {},
  layers: [
    { id: 'bg', type: 'background', paint: { 'background-color': '#1a2230' } }
  ]
};

const GEOJSON_WORLD_URL = 'world.geojson';
const GEOJSON_PREF_URL = 'prefectures.geojson';
const GEOJSON_PLATE_BOUNDARIES_URL = 'plate-boundaries.geojson';

const JAPAN_CENTER = [138.5, 37.0];

let epinameGrid = null;
let epinameNames = null;
let epinameSortedLatKeys = null;
let epinameLoadPromise = null;

function parseEpinameData() {
  const rawNames = window.EPINAME_LIST;
  const rawGrid = window.EPINAME_GRID_RAW;
  if (!rawNames || !rawGrid) throw new Error('EPINAME data not found');

  epinameNames = rawNames;
  epinameGrid = new Map();

  const latRows = rawGrid.split(';');
  for (const row of latRows) {
    if (!row) continue;
    const colonIdx = row.indexOf(':');
    const latKey = parseInt(row.slice(0, colonIdx), 36);
    const entriesStr = row.slice(colonIdx + 1);
    const entries = [];
    let prevLon = 0;
    if (entriesStr) {
      for (const pair of entriesStr.split(',')) {
        const [diffStr, idxStr] = pair.split('_');
        const diff = parseInt(diffStr, 36);
        const idx = parseInt(idxStr, 36);
        prevLon += diff;
        entries.push([prevLon, idx]);
      }
    }
    epinameGrid.set(latKey, entries);
  }
  epinameSortedLatKeys = Array.from(epinameGrid.keys()).sort((a, b) => a - b);
}

async function loadEpinameData() {
  if (epinameLoadPromise) return epinameLoadPromise;
  epinameLoadPromise = (async () => {
    try {
      if (!window.EPINAME_LIST || !window.EPINAME_GRID_RAW) {
        await loadScriptOnce('epiname_data.js');
      }
      parseEpinameData();
    } catch (e) {
      console.error('震央地名データの読み込みに失敗しました:', e);
      toast('震央地名データの読み込みに失敗しました');
    }
  })();
  return epinameLoadPromise;
}

function loadScriptOnce(src) {
  return new Promise((resolve, reject) => {
    const existing = document.querySelector(`script[data-epiname-src="${src}"]`);
    if (existing) { existing.addEventListener('load', resolve); existing.addEventListener('error', reject); return; }
    const el = document.createElement('script');
    el.src = src;
    el.dataset.epinameSrc = src;
    el.onload = resolve;
    el.onerror = reject;
    document.head.appendChild(el);
  });
}

function nearestIndexSorted(sortedArr, value) {
  let lo = 0, hi = sortedArr.length - 1;
  if (hi < 0) return -1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (sortedArr[mid] < value) lo = mid + 1; else hi = mid;
  }
  if (lo > 0) {
    const prev = sortedArr[lo - 1];
    const cur = sortedArr[lo];
    if (Math.abs(prev - value) <= Math.abs(cur - value)) return lo - 1;
  }
  return lo;
}

function lookupEpicenterName(lon, lat) {
  if (lon == null || lat == null || isNaN(lon) || isNaN(lat)) return null;
  if (!epinameGrid || !epinameSortedLatKeys || !epinameNames) return null;
  if (epinameSortedLatKeys.length === 0) return null;

  const EPS = 1e-6;
  const latKeyF = lat * 60 + EPS;
  const latIdx = nearestIndexSorted(epinameSortedLatKeys, latKeyF);
  if (latIdx < 0) return null;
  const latKey = epinameSortedLatKeys[latIdx];
  const entries = epinameGrid.get(latKey);
  if (!entries || entries.length === 0) return null;

  const lonKeyF = lon * 60 + EPS;
  let idx = -1;
  let loI = 0, hiI = entries.length - 1;
  while (loI <= hiI) {
    const mid = (loI + hiI) >> 1;
    if (entries[mid][0] <= lonKeyF) { idx = mid; loI = mid + 1; } else { hiI = mid - 1; }
  }
  if (idx < 0) idx = 0;
  const nameIdx = entries[idx][1];
  return epinameNames[nameIdx] || null;
}

function toast(msg, ms = 4200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), ms);
}

function pad2(n) { return String(n).padStart(2, '0'); }

function createDateFieldHTML(id, isoValue) {
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(isoValue || '');
  const y = m ? m[1] : '';
  const mo = m ? m[2] : '';
  const d = m ? m[3] : '';
  const todayIso = defaultDateStr(0);
  return `
    <div class="date-field" data-date-field-id="${id}">
      <input type="hidden" id="${id}" value="${isoValue || ''}">
      <input class="date-seg seg-y" type="text" inputmode="numeric" maxlength="4" placeholder="年" data-seg="y" value="${y}">
      <span class="date-sep">/</span>
      <input class="date-seg seg-m" type="text" inputmode="numeric" maxlength="2" placeholder="月" data-seg="m" value="${mo}">
      <span class="date-sep">/</span>
      <input class="date-seg seg-d" type="text" inputmode="numeric" maxlength="2" placeholder="日" data-seg="d" value="${d}">
      <button type="button" class="date-field-cal-btn" title="カレンダーから選択">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        <input type="date" tabindex="-1" aria-hidden="true" value="${isoValue || ''}" max="${todayIso}">
      </button>
    </div>`;
}

function bindDateField(id, onChange) {
  const root = document.querySelector(`.date-field[data-date-field-id="${id}"]`);
  if (!root) return;
  const hidden = document.getElementById(id);
  const segY = root.querySelector('[data-seg="y"]');
  const segM = root.querySelector('[data-seg="m"]');
  const segD = root.querySelector('[data-seg="d"]');
  const calInput = root.querySelector('.date-field-cal-btn input[type="date"]');

  function currentIso() {
    const y = segY.value.trim();
    const mo = segM.value.trim();
    const d = segD.value.trim();
    if (y.length === 4 && mo.length >= 1 && d.length >= 1) {
      const isoStr = `${y}-${pad2(Number(mo))}-${pad2(Number(d))}`;
      const dt = new Date(isoStr + 'T00:00:00');
      if (!isNaN(dt) && dt.getFullYear() === Number(y) && dt.getMonth() + 1 === Number(mo) && dt.getDate() === Number(d)) {
        return isoStr;
      }
    }
    return '';
  }

  const todayIso = defaultDateStr(0);
  function clampToToday(iso) {
    if (iso && iso > todayIso) return todayIso;
    return iso;
  }

  function commit() {
    let iso = currentIso();
    const clamped = clampToToday(iso);
    if (clamped !== iso && clamped) {
      iso = clamped;
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
      segY.value = m[1]; segM.value = m[2]; segD.value = m[3];
    }
    hidden.value = iso;
    if (calInput) calInput.value = iso;
    if (onChange) onChange(iso);
  }

  function wireSegment(el, maxLen, next) {
    el.addEventListener('input', () => {
      const digits = el.value.replace(/\D/g, '').slice(0, maxLen);
      el.value = digits;
      if (digits.length >= maxLen && next) next.focus();
      commit();
    });
    el.addEventListener('blur', () => {
      if (el.dataset.seg !== 'y' && el.value.length === 1) {
        el.value = pad2(Number(el.value));
      }
      commit();
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && el.selectionStart === 0 && el.selectionEnd === 0) {
        const prev = el === segD ? segM : (el === segM ? segY : null);
        if (prev) { prev.focus(); prev.setSelectionRange(prev.value.length, prev.value.length); }
      }
    });
    el.addEventListener('focus', () => { el.select(); });
  }
  wireSegment(segY, 4, segM);
  wireSegment(segM, 2, segD);
  wireSegment(segD, 2, null);

  if (calInput) {
    calInput.addEventListener('change', () => {
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(calInput.value || '');
      if (m) {
        segY.value = m[1]; segM.value = m[2]; segD.value = m[3];
        commit();
      }
    });
  }
}

function hypoUrlFor(dateObj) {
  const y = dateObj.getFullYear();
  const m = pad2(dateObj.getMonth() + 1);
  const d = pad2(dateObj.getDate());
  return `https://www.jma.go.jp/bosai/hypo/data/${y}/${m}/hypo${y}${m}${d}.geojson`;
}

function dateRange(startStr, endStr) {
  const out = [];
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  if (isNaN(start) || isNaN(end) || start > end) return out;
  const cur = new Date(start);
  while (cur <= end) {
    out.push(new Date(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}

function pickProp(props, keys, fallback = null) {
  for (const k of keys) {
    if (props[k] !== undefined && props[k] !== null) return props[k];
  }
  return fallback;
}

function normalizeFeature(feature) {
  const p = feature.properties || {};
  const coords = (feature.geometry && feature.geometry.coordinates) || [null, null, null];
  const lon = coords[0];
  const lat = coords[1];
  let depth = coords[2];
  if (depth === undefined || depth === null) {
    const depRaw = pickProp(p, ['dep', 'depth'], null);
    depth = depRaw !== null ? Number(depRaw) : null;
  }
  if (depth !== undefined && depth !== null && !isNaN(depth) && depth < 0) depth = -depth;
  if (depth !== null && isNaN(depth)) depth = null;

  const mag = Number(pickProp(p, ['mag', 'magnitude', 'Magunitude', 'M'], NaN));
  const timeRaw = pickProp(p, ['time', 'origin_time', 'at', 'date'], null);
  const placeRaw = pickProp(p, ['place', 'epi', 'region', 'name'], null);
  const placeByCoord = lookupEpicenterName(lon, lat);
  const place = placeByCoord || placeRaw || '不明';
  const maxInt = pickProp(p, ['maxInt', 'max_int', 'maxi', 'intensity'], null);

  let timeMs = null;
  if (timeRaw) {
    const t = new Date(timeRaw);
    if (!isNaN(t)) timeMs = t.getTime();
  }

  return {
    lon, lat, depth,
    mag: isNaN(mag) ? null : mag,
    time: timeMs,
    timeRaw,
    place,
    maxInt,
    raw: p
  };
}

const hypoDayCache = new Map();

function dayKey(dateObj) {
  return `${dateObj.getFullYear()}-${pad2(dateObj.getMonth() + 1)}-${pad2(dateObj.getDate())}`;
}

async function fetchHypoDay(dateObj, { signal } = {}) {
  const url = hypoUrlFor(dateObj);
  await loadEpinameData();
  const res = await fetch(url, { signal, mode: 'cors' });
  if (!res.ok) throw new Error(`HTTP ${res.status} @ ${url}`);
  const gj = await res.json();
  const feats = (gj.features || []).map(normalizeFeature).filter(f => f.lon != null && f.lat != null);
  return feats;
}

async function fetchHypoRange(dates, onProgress) {
  const all = [];
  let done = 0;
  let cacheHits = 0;
  const errors = [];
  for (const d of dates) {
    const key = dayKey(d);
    const cached = hypoDayCache.get(key);
    if (cached) {
      const isToday = key === dayKey(new Date());
      if (!isToday) {
        if (cached.error) errors.push({ date: d, error: cached.error });
        else all.push(...cached.features);
        done++; cacheHits++;
        if (onProgress) onProgress(done, dates.length, errors, cacheHits);
        continue;
      }
    }
    try {
      const feats = await fetchHypoDay(d);
      hypoDayCache.set(key, { features: feats, error: null });
      all.push(...feats);
    } catch (e) {
      hypoDayCache.set(key, { features: [], error: e });
      errors.push({ date: d, error: e });
    }
    done++;
    if (onProgress) onProgress(done, dates.length, errors, cacheHits);
  }
  return { features: all, errors, cacheHits };
}

function isRangeFullyCached(dates) {
  const todayKey = dayKey(new Date());
  return dates.every(d => {
    const key = dayKey(d);
    return key !== todayKey && hypoDayCache.has(key);
  });
}

function buildFromCache(dates) {
  const all = [];
  const errors = [];
  for (const d of dates) {
    const cached = hypoDayCache.get(dayKey(d));
    if (!cached) continue;
    if (cached.error) errors.push({ date: d, error: cached.error });
    else all.push(...cached.features);
  }
  return { features: all, errors };
}

let sharedMap = null;
let sharedDateRange = { startDate: null, endDate: null, rawFeatures: null };
let epicenterState = { data: [], startDate: null, endDate: null };

function magColor(mag) {
  if (mag == null) return '#8a8f9a';
  if (mag < 3) return '#4fc3f7';
  if (mag < 4) return '#39d98a';
  if (mag < 5) return '#f9d55c';
  if (mag < 6) return '#ff9f43';
  if (mag < 7) return '#ff5470';
  return '#d63aff';
}

function magRadius(mag) {
  if (mag == null) return 3;
  return Math.max(3, Math.min(22, mag * 3.2));
}

function featuresToGeoJSON(feats) {
  const sorted = [...feats].sort((a, b) => (a.mag ?? -Infinity) - (b.mag ?? -Infinity));
  return {
    type: 'FeatureCollection',
    features: sorted.map(f => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [f.lon, f.lat] },
      properties: {
        mag: f.mag,
        depth: f.depth,
        place: f.place,
        time: f.time,
        maxInt: f.maxInt,
        color: magColor(f.mag),
        radius: magRadius(f.mag)
      }
    }))
  };
}

function applySharedFeatures(rawFeatures) {
  const src = sharedMap.getSource('quake-src');
  if (src) src.setData(featuresToGeoJSON(rawFeatures));

  epicenterState.data = rawFeatures;
  bvalueState.data = rawFeatures.filter(f => f.mag != null);

  if (document.getElementById('bv-result')) {
    computeAndRenderBvalue();
  }
}

async function loadBaseGeoJsonLayers(worldDataPromise, prefDataPromise) {
  try {
    const [worldData, prefData] = await Promise.all([
      worldDataPromise,
      prefDataPromise
    ]);

    sharedMap.addSource('base-world', { type: 'geojson', data: worldData });
    sharedMap.addLayer({
      id: 'base-world-fill',
      type: 'fill',
      source: 'base-world',
      paint: { 'fill-color': '#4d5468', 'fill-opacity': 1 }
    });
    sharedMap.addLayer({
      id: 'base-world-line',
      type: 'line',
      source: 'base-world',
      paint: { 'line-color': '#69708a', 'line-width': 0.6 }
    });

    sharedMap.addSource('base-pref', { type: 'geojson', data: prefData });
    sharedMap.addLayer({
      id: 'base-pref-fill',
      type: 'fill',
      source: 'base-pref',
      paint: { 'fill-color': '#4d5468', 'fill-opacity': 1 }
    });
    sharedMap.addLayer({
      id: 'base-pref-line',
      type: 'line',
      source: 'base-pref',
      paint: { 'line-color': '#69708a', 'line-width': 0.6 }
    });

    const baseLayerIds = [
      'base-world-fill', 'base-world-line',
      'base-pref-fill', 'base-pref-line'
    ];
    const beforeId = sharedMap.getLayer('quake-circles') ? 'quake-circles' : undefined;
    baseLayerIds.forEach(id => sharedMap.moveLayer(id, beforeId));
  } catch (e) {
    console.error('ベース地図（GeoJSON）の読み込みに失敗しました:', e);
    toast('ベース地図データの読み込みに失敗しました');
  }
}

async function loadPlateBoundaryLayer(plateDataPromise) {
  try {
    const data = await plateDataPromise;
    sharedMap.addSource('plate-boundaries-src', { type: 'geojson', data });
    sharedMap.addLayer({
      id: 'plate-boundaries-line',
      type: 'line',
      source: 'plate-boundaries-src',
      layout: { 'line-join': 'round', 'line-cap': 'round' },

        'line-color': '#cfe0ff',
        'line-width': 1.3,

      }
    });

  } catch (e) {
    console.error('プレート境界データの読み込みに失敗しました:', e);
    toast('プレート境界データの読み込みに失敗しました');
  }
}

function initSharedMap() {
  sharedMap = new maplibregl.Map({
    container: 'map-shared',
    style: DARK_STYLE,
    center: JAPAN_CENTER,
    zoom: 4.4,
    attributionControl: { compact: true }
  });
  sharedMap.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

  sharedMap.on('load', () => {
    const worldDataPromise = fetch(GEOJSON_WORLD_URL).then(r => r.json());
    const prefDataPromise = fetch(GEOJSON_PREF_URL).then(r => r.json());
    const plateDataPromise = fetch(GEOJSON_PLATE_BOUNDARIES_URL).then(r => r.json());

    loadBaseGeoJsonLayers(worldDataPromise, prefDataPromise)
      .then(() => loadPlateBoundaryLayer(plateDataPromise));

    sharedMap.addSource('quake-src', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

    sharedMap.addLayer({
      id: 'quake-circles',

        'circle-radius': ['get', 'radius'],

      }
    });

    sharedMap.on('click', 'quake-circles', (e) => {
      const feature = e.features[0];
      const p = feature.properties;
      const coords = feature.geometry.coordinates.slice();
      const html = `
        <div class="font-num" style="font-family:var(--font-base); font-size:12px; line-height:1.6;">
          <div style="font-weight:700; font-size:13px; margin-bottom:4px;">${p.place || '不明'}</div>
          M ${p.mag != null ? p.mag.toFixed(1) : '—'} / 深さ ${p.depth != null ? Math.round(p.depth) + 'km' : '—'}<br>
          ${(() => {
            const t = Number(p.time);
            return (p.time != null && !isNaN(t)) ? new Date(t).toLocaleString('ja-JP') : '';
          })()}
        </div>`;
      new maplibregl.Popup({ closeButton: true })
        .setLngLat(coords)
        .setHTML(html)
        .addTo(sharedMap);
    });
    sharedMap.on('mouseenter', 'quake-circles', () => sharedMap.getCanvas().style.cursor = 'pointer');
    sharedMap.on('mouseleave', 'quake-circles', () => sharedMap.getCanvas().style.cursor = '');

    sharedMap.addSource('bv-bbox', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    sharedMap.addLayer({
      id: 'bv-bbox-fill',
      type: 'fill',
      source: 'bv-bbox',
      paint: { 'fill-color': '#ff9f43', 'fill-opacity': 0.08 }
    });
    sharedMap.addLayer({
      id: 'bv-bbox-line',
      type: 'line',
      source: 'bv-bbox',
      paint: { 'line-color': '#ff9f43', 'line-width': 1.6, 'line-dasharray': [2, 2] }
    });

    sharedMap.setLayoutProperty('bv-bbox-fill', 'visibility', 'none');
    sharedMap.setLayoutProperty('bv-bbox-line', 'visibility', 'none');

    setupBboxDrawing();
    buildSharedDatePanel();
    buildEpicenterPanel();
    buildBvaluePanel();
    applyResponsivePanelLayout();
  });
}

function defaultDateStr(offsetDays = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
}

const MOBILE_BREAKPOINT = 720;
function isMobileLayout() { return window.innerWidth <= MOBILE_BREAKPOINT; }

function applyResponsivePanelLayout() {
  const mobile = isMobileLayout();
  const panels = document.querySelectorAll('.floating-panel');
  
  panels.forEach(p => {
    p.classList.toggle('mobile-stacked', mobile);
    // デスクトップ時の本来の配置を記憶しておく
    if (!p.dataset.desktopTop) p.dataset.desktopTop = p.style.top;
    if (!p.dataset.desktopRight) p.dataset.desktopRight = p.style.right;
    if (!p.dataset.desktopLeft) p.dataset.desktopLeft = p.style.left;
  });

  if (!mobile) {
    // デスクトップ復帰時は、記憶しておいた本来の配置に戻す
    panels.forEach(p => {
      if (p.dataset.desktopTop) p.style.top = p.dataset.desktopTop;
      if (p.dataset.desktopRight) p.style.right = p.dataset.desktopRight;
      if (p.dataset.desktopLeft) p.style.left = p.dataset.desktopLeft;
    });
    return;
  }

  const MOBILE_TOP_GAP = 6;
  const MOBILE_STACK_GAP = 6;
  let cursorTop = MOBILE_TOP_GAP;

  const sharedDatePanelRoot = document.getElementById('shared-date-panel-root');
  const orderedPanels = [];
  if (sharedDatePanelRoot && sharedDatePanelRoot.style.display !== 'none') {
    orderedPanels.push(...sharedDatePanelRoot.querySelectorAll('.floating-panel'));
  }
  const activeView = document.querySelector('.view.active');
  if (activeView) {
    orderedPanels.push(...activeView.querySelectorAll('.floating-panel'));
  }

  orderedPanels.forEach(p => {
    // b値の結果パネルは縦積みから除外し、画面右上に固定する
    if (p.id === 'bv-result-panel') {
      p.style.top = `${MOBILE_TOP_GAP}px`;
      return; 
    }
    p.style.top = `${cursorTop}px`;
    cursorTop += p.offsetHeight + MOBILE_STACK_GAP;
  });
}

let responsiveLayoutResizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(responsiveLayoutResizeTimer);
  responsiveLayoutResizeTimer = setTimeout(applyResponsivePanelLayout, 120);
});

function buildSharedDatePanel() {
  const container = document.getElementById('shared-date-panel-root');
  const panel = document.createElement('div');
  panel.className = 'floating-panel glass-panel';
  panel.style.cssText = 'top:16px; left:16px; width:250px;';
  const initStart = sharedDateRange.startDate || defaultDateStr(-7);
  const initEnd = sharedDateRange.endDate || defaultDateStr(0);
  panel.innerHTML = `
    <div class="panel-title"><span class="bar"></span>期間指定</div>
    <label class="field-label">開始日</label>
    ${createDateFieldHTML('shared-date-start', initStart)}
    <div style="height:8px;"></div>
    <label class="field-label">終了日</label>
    ${createDateFieldHTML('shared-date-end', initEnd)}
    <div style="height:12px;"></div>
    <button class="btn btn-accent" id="shared-date-fetch" style="width:100%;">データ取得</button>
    <div style="height:10px;"></div>
    <div class="status-text" id="shared-date-status">待機中</div>
  `;
  container.appendChild(panel);

  bindDateField('shared-date-start');
  bindDateField('shared-date-end');

  document.getElementById('shared-date-fetch').addEventListener('click', runSharedFetch);

  if (sharedDateRange.rawFeatures) {
    runSharedFetch();
  }
}

async function runSharedFetch() {
  try {
    await runSharedFetchInner();
  } finally {
    if (isMobileLayout()) applyResponsivePanelLayout();
  }
}

async function runSharedFetchInner() {
  const startStr = document.getElementById('shared-date-start').value;
  const endStr = document.getElementById('shared-date-end').value;
  const statusEl = document.getElementById('shared-date-status');
  const btn = document.getElementById('shared-date-fetch');
  if (!startStr || !endStr) { toast('開始日・終了日を指定してください'); return; }

  const dates = dateRange(startStr, endStr);
  if (dates.length === 0) { toast('日付範囲が不正です'); return; }
  if (dates.length > 92) { toast('一度に取得できるのは最大92日分です'); return; }

  if (sharedDateRange.rawFeatures && sharedDateRange.startDate === startStr && sharedDateRange.endDate === endStr) {
    applySharedFeatures(sharedDateRange.rawFeatures);
    statusEl.textContent = `${sharedDateRange.rawFeatures.length}件（共有データから即時反映）`;
    return;
  }

  if (isRangeFullyCached(dates)) {
    const { features, errors } = buildFromCache(dates);
    sharedDateRange.startDate = startStr;
    sharedDateRange.endDate = endStr;
    sharedDateRange.rawFeatures = features;
    applySharedFeatures(features);
    statusEl.textContent = `${features.length}件（キャッシュから即時反映）${errors.length ? `／${errors.length}日分は取得失敗` : ''}`;
    return;
  }

  btn.disabled = true;
  statusEl.innerHTML = `<span class="spinner"></span> 取得中 0 / ${dates.length}`;

  const { features, errors, cacheHits } = await fetchHypoRange(dates, (done, total, errs, hits) => {
    statusEl.innerHTML = `<span class="spinner"></span> 取得中 ${done} / ${total}${hits ? `（キャッシュ ${hits}件）` : ''}`;
  });

  btn.disabled = false;
  sharedDateRange.startDate = startStr;
  sharedDateRange.endDate = endStr;
  sharedDateRange.rawFeatures = features;
  applySharedFeatures(features);

  if (errors.length > 0) {
    statusEl.textContent = `${features.length}件取得（${errors.length}日分は取得失敗）`;
    console.warn('hypo fetch errors:', errors);
    if (errors.length === dates.length) {
      toast('CORSまたはネットワークエラーによりデータを取得できませんでした。ブラウザのコンソールを確認してください。');
    }
  } else {
    statusEl.textContent = `${features.length}件取得完了${cacheHits ? `（うちキャッシュ ${cacheHits}日分）` : ''}`;
  }
}

  panel.innerHTML = `

      margin-bottom:0; width:100%; background:none; border:none; padding:0; cursor:pointer;

function setupBboxDrawing() {
  let startLngLat = null;

  function bboxPolygon(a, b) {
    const minLon = Math.min(a.lng, b.lng), maxLon = Math.max(a.lng, b.lng);
    const minLat = Math.min(a.lat, b.lat), maxLat = Math.max(a.lat, b.lat);
    return {
      bbox: [minLon, minLat, maxLon, maxLat],
      geojson: {
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: {
            type: 'Polygon',
            coordinates: [[[minLon, minLat], [maxLon, minLat], [maxLon, maxLat], [minLon, maxLat], [minLon, minLat]]]
          },
          properties: {}
        }]
      }
    };
  }

  function finishDrawing() {
    startLngLat = null;
    bvalueState.drawing = false;
    const btn = document.getElementById('bv-draw-btn');
    if (btn) { btn.classList.remove('btn-accent'); btn.textContent = '領域を選択'; }
    sharedMap.getCanvas().style.cursor = '';
  }

  function onClick(e) {
    if (!bvalueState.drawing) return;
    if (!startLngLat) {
      startLngLat = e.lngLat;
      const btn = document.getElementById('bv-draw-btn');
      if (btn) btn.textContent = '2点目クリック';
    } else {
      const { bbox, geojson } = bboxPolygon(startLngLat, e.lngLat);
      sharedMap.getSource('bv-bbox').setData(geojson);
      bvalueState.bbox = bbox;
      finishDrawing();
      updateBboxLabel();
      computeAndRenderBvalue();
    }
  }

  sharedMap.on('click', onClick);

  bvalueState._cancelDrawing = () => { finishDrawing(); };
  bvalueState._onDrawModeChanged = (isDrawing) => {
    if (!isDrawing) finishDrawing();
    else sharedMap.getCanvas().style.cursor = 'crosshair';
  };
}

  el.textContent = `${minLat.toFixed(2)}〜${maxLat.toFixed(2)}°N, ${minLon.toFixed(2)}〜${maxLon.toFixed(2)}°E`;

function pointInBbox(lon, lat, bbox) {
  if (!bbox) return true;
  const [minLon, minLat, maxLon, maxLat] = bbox;
  return lon >= minLon && lon <= maxLon && lat >= minLat && lat <= maxLat;
}

function estimateMcMaxCurvature(mags, binWidth = 0.1) {
  if (mags.length === 0) return null;
  const rounded = mags.map(m => Math.round(m / binWidth) * binWidth);
  const counts = new Map();
  rounded.forEach(m => counts.set(m, (counts.get(m) || 0) + 1));
  let bestM = null, bestCount = -1;
  for (const [m, c] of counts.entries()) {
    if (c > bestCount) { bestCount = c; bestM = m; }
  }
  return bestM;
}

function computeBvalueAki(mags, mc, binWidth = 0.1) {
  const sample = mags.filter(m => m >= mc - 1e-9);
  const n = sample.length;
  if (n < 2) return { b: null, n, stdErr: null };
  const meanM = sample.reduce((a, b) => a + b, 0) / n;
  const b = Math.LOG10E / (meanM - (mc - binWidth / 2));
  const variance = sample.reduce((acc, m) => acc + Math.pow(m - meanM, 2), 0) / (n * (n - 1));
  const stdErr = 2.30 * Math.sqrt(variance) * b * b;
  return { b, n, stdErr, meanM };
}

function computeAndRenderBvalue() {
  try {
    computeAndRenderBvalueInner();
  } finally {
    if (isMobileLayout()) applyResponsivePanelLayout();
  }
}

function computeAndRenderBvalueInner() {
  const resultEl = document.getElementById('bv-result');
  if (!resultEl) return;

  if (!bvalueState.bbox) {
    resultEl.innerHTML = `<span style="color:var(--text-2);">地図上で解析対象領域を選択してください</span>`;
    return;
  }

  const filtered = bvalueState.data.filter(f => pointInBbox(f.lon, f.lat, bvalueState.bbox));
  const mags = filtered.map(f => f.mag).filter(m => m != null);

  if (mags.length < 5) {
    resultEl.innerHTML = `対象地震数: ${mags.length}<br><span style="color:var(--text-2);">解析には最低5件以上必要です</span>`;
    return;
  }

  const mcMode = document.getElementById('bv-mc-mode').value;
  let mc;
  if (mcMode === 'manual') {
    mc = parseFloat(document.getElementById('bv-mc-manual').value) || 2.0;
  } else {
    mc = estimateMcMaxCurvature(mags);
  }

  const { b, n, stdErr, meanM } = computeBvalueAki(mags, mc);

  if (b == null) {
    resultEl.innerHTML = `Mc以上のデータが不足しています（Mc=${mc.toFixed(1)}）`;
    return;
  }

  const aValue = Math.log10(n) + b * mc;

  resultEl.innerHTML = `
    <div class="font-num" style="font-size:26px; font-weight:800; color:var(--accent); font-family:var(--font-base);">
      b = ${b.toFixed(3)} <span style="font-size:13px; color:var(--text-2); font-weight:400;">± ${stdErr.toFixed(3)}</span>
    </div>
    <div class="divider" style="margin:8px 0;"></div>
    総地震数（選択領域）: ${mags.length}<br>
    Mc（完全性閾値）: ${mc.toFixed(1)}<br>
    解析対象数（M≥Mc）: ${n}<br>
    平均M: ${meanM.toFixed(2)}<br>
    a値（推定）: ${aValue.toFixed(2)}
  `;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function toRad(d) { return d * Math.PI / 180; }

function pPolarity(strikeDeg, dipDeg, rakeDeg, azDeg, toffDeg) {
  const strike = toRad(strikeDeg), dip = toRad(dipDeg), rake = toRad(rakeDeg);
  const az = toRad(azDeg), toff = toRad(toffDeg);
  const phi = az - strike;

  const sinToff = Math.sin(toff), cosToff = Math.cos(toff);
  const sinPhi = Math.sin(phi), cosPhi = Math.cos(phi);
  const sin2Phi = Math.sin(2 * phi);

  const sinDip = Math.sin(dip), cosDip = Math.cos(dip);
  const sin2Dip = Math.sin(2 * dip), cos2Dip = Math.cos(2 * dip);
  const sinRake = Math.sin(rake), cosRake = Math.cos(rake);

  const Rp =
    cosRake * sinDip * sinToff * sinToff * sin2Phi
    - cosRake * cosDip * 2 * sinToff * cosToff * cosPhi
    + sinRake * sin2Dip * (cosToff * cosToff - sinToff * sinToff * sinPhi * sinPhi)
    + sinRake * cos2Dip * 2 * sinToff * cosToff * sinPhi;

  return Rp >= 0 ? 1 : -1;
}

function computePTAxes(strikeDeg, dipDeg, rakeDeg) {
  const strike = toRad(strikeDeg), dip = toRad(dipDeg), rake = toRad(rakeDeg);

  const n = [
    -Math.sin(dip) * Math.sin(strike),
    Math.sin(dip) * Math.cos(strike),
    -Math.cos(dip)
  ];
  const d = [
    Math.cos(rake) * Math.cos(strike) + Math.sin(rake) * Math.cos(dip) * Math.sin(strike),
    Math.cos(rake) * Math.sin(strike) - Math.sin(rake) * Math.cos(dip) * Math.cos(strike),
    -Math.sin(rake) * Math.sin(dip)
  ];

  const t = [(n[0] - d[0]) / Math.SQRT2, (n[1] - d[1]) / Math.SQRT2, (n[2] - d[2]) / Math.SQRT2];
  const p = [(n[0] + d[0]) / Math.SQRT2, (n[1] + d[1]) / Math.SQRT2, (n[2] + d[2]) / Math.SQRT2];

  function toAzToff(v) {
    let [north, east, down] = v;
    if (down < 0) { north = -north; east = -east; down = -down; }
    const toff = Math.acos(Math.max(-1, Math.min(1, down))) * 180 / Math.PI; 
    const az = Math.atan2(east, north) * 180 / Math.PI;
    return { az, toff };
  }

  return { P: toAzToff(p), T: toAzToff(t) };
}

function projectLowerHemisphere(azDeg, toffDeg, cx, cy, R) {
  const rNorm = Math.SQRT2 * Math.sin(toRad(toffDeg) / 2);
  const az = toRad(azDeg);
  const x = cx + R * rNorm * Math.sin(az);
  const y = cy - R * rNorm * Math.cos(az);
  return { x, y };
}

function renderBeachballDataUrl(strikeDeg, dipDeg, rakeDeg, size = 200) {
  const COLOR_COMPRESS = [142, 142, 142];
  const COLOR_TENSION  = [255, 255, 255]; 
  const COLOR_BORDER   = '#b4b4b4';
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const labelMargin = size * 0.09;
  const R = size / 2 - 2 - labelMargin;

  ctx.clearRect(0, 0, size, size);
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle = `rgb(${COLOR_TENSION.join(',')})`;  
  ctx.fillRect(0, 0, size, size);

  const img = ctx.getImageData(0, 0, size, size);
  const data = img.data;
  for (let py = 0; py < size; py++) {
    for (let px = 0; px < size; px++) {
      const x = (px - cx) / R;   
      const y = -(py - cy) / R;  
      const rNorm = Math.sqrt(x * x + y * y);
      if (rNorm > 1) continue;
      const toff = 2 * Math.asin(Math.min(1, rNorm / Math.SQRT2)) * 180 / Math.PI;
      const az = Math.atan2(x, y) * 180 / Math.PI; 
      const pol = pPolarity(strikeDeg, dipDeg, rakeDeg, az, toff);
      if (pol > 0) {
        const idx = (py * size + px) * 4;
        data[idx] = COLOR_COMPRESS[0]; data[idx + 1] = COLOR_COMPRESS[1]; data[idx + 2] = COLOR_COMPRESS[2]; data[idx + 3] = 255; 
      }
    }
  }
  ctx.putImageData(img, 0, 0);
  ctx.restore();

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = COLOR_BORDER;
  ctx.lineWidth = 1.8;
  ctx.stroke();

  const compassFontSize = Math.round(size * 0.075);
  ctx.font = `${compassFontSize}px ${getComputedStyle(document.body).fontFamily || 'sans-serif'}`;
  ctx.fillStyle = '#000000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const compassR = R + labelMargin * 0.62;
  ctx.fillText('N', cx, cy - compassR);
  ctx.fillText('S', cx, cy + compassR);
  ctx.fillText('E', cx + compassR, cy);
  ctx.fillText('W', cx - compassR, cy);

  const axes = computePTAxes(strikeDeg, dipDeg, rakeDeg);
  const axisFontSize = Math.round(size * 0.08);
  ctx.font = `bold ${axisFontSize}px ${getComputedStyle(document.body).fontFamily || 'sans-serif'}`;
  const axisR = R * 0.55;

  function drawAxisLabel(label, az, toff, isOnDark) {
    const pos = projectLowerHemisphere(az, toff, cx, cy, R);
    const dx = pos.x - cx, dy = pos.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const clampedDist = Math.min(dist, axisR);
    const scale = dist > 0 ? clampedDist / dist : 0;
    const lx = cx + dx * scale;
    const ly = cy + dy * scale;
    ctx.fillStyle = isOnDark ? '#ffffff' : '#000000';
    ctx.fillText(label, lx, ly);
  }

  const pIsDark = pPolarity(strikeDeg, dipDeg, rakeDeg, axes.P.az, axes.P.toff) > 0;
  const tIsDark = pPolarity(strikeDeg, dipDeg, rakeDeg, axes.T.az, axes.T.toff) > 0;
  drawAxisLabel('P', axes.P.az, axes.P.toff, pIsDark);
  drawAxisLabel('T', axes.T.az, axes.T.toff, tIsDark);

  return canvas.toDataURL('image/png');
}

function mechProxyUrl(targetUrl) {
  return `https://r.jina.ai/${targetUrl}`;
}

async function fetchMechList() {
  const target = 'https://www.data.jma.go.jp/eew/data/mech/top.html';
  const res = await fetch(mechProxyUrl(target));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  return parseMechListText(text);
}

function splitMdRow(line) {
  let s = line.trim();
  if (s.startsWith('|')) s = s.slice(1);
  if (s.endsWith('|')) s = s.slice(0, -1);
  return s.split('|').map(c => c.trim());
}

function parseMdLink(cell) {
  const m = /\[([^\]]*)\]\(([^\s)]+)(?:\s+"[^"]*")?\)/.exec(cell);
  if (!m) return null;
  return { label: m[1], url: m[2] };
}

function parseJmaTimeStrToMs(timeStr) {
  const m = /(\d{4})年(\d{2})月(\d{2})日(\d{2})時(\d{2})分/.exec(timeStr || '');
  if (!m) return null;
  const y = Number(m[1]), mo = Number(m[2]), d = Number(m[3]), h = Number(m[4]), mi = Number(m[5]);
  return Date.UTC(y, mo - 1, d, h, mi) - 9 * 60 * 60 * 1000;
}

function parseMechListText(text) {
  const lines = text.split('\n');
  const rows = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line.includes('|') || !/\d{4}年\d{2}月\d{2}日\d{2}時\d{2}分頃/.test(line)) continue;

    const cells = splitMdRow(line);
    if (cells.length < 6) continue;

    const timeMatch = /(\d{4}年\d{2}月\d{2}日\d{2}時\d{2}分頃)/.exec(cells[0]);
    if (!timeMatch) continue;
    const timeStr = timeMatch[1];

    let lat = null, lon = null, depth = null, mag = null, place = null;
    const links = [];
    for (const c of cells.slice(1)) {
      const latM = /北緯([\d.]+)度/.exec(c);
      const lonM = /東経([\d.]+)度/.exec(c);
      const depM = depth == null && /^(約?[\d.]+\s*km|ごく浅い)$/.exec(c);
      if (latM) { lat = parseFloat(latM[1]); continue; }
      if (lonM) { lon = parseFloat(lonM[1]); continue; }
      if (depM) { depth = c; continue; }
      const link = parseMdLink(c);
      if (link) { links.push(link); continue; }
      if (c === '-') { links.push(null); continue; }
      if (/^[\d.]+$/.test(c) && mag == null) { mag = parseFloat(c); continue; }
      if (c && place == null && !/^[\d.]+$/.test(c)) { place = c; continue; }
    }

    if (lat == null || lon == null || mag == null) continue;

    const solutions = [];
    if (links[0]) solutions.push({ source: 'jma', kind: 'initial', label: '初動解', url: links[0].url });
    if (links[1]) solutions.push({ source: 'jma', kind: 'cmt-domestic', label: 'CMT解(国内)', url: links[1].url });
    if (links[2]) solutions.push({ source: 'jma', kind: 'cmt-world', label: 'CMT解(全世界)', url: links[2].url });

    rows.push({
      source: 'jma',
      timeStr,
      timeMs: parseJmaTimeStrToMs(timeStr),
      lat, lon,
      depth: depth || '不明',
      mag,
      place: place || '不明',
      initial: links[0] || null,
      cmtDomestic: links[1] || null,
      cmtWorld: links[2] || null,
      solutions
    });
  }
  return rows;
}

function mechFigImageUrl(figHtmlUrl) {
  return figHtmlUrl.replace(/\.html$/, '.png');
}

function fitMechImage(img) {
  const src = img.currentSrc || img.src || '';
  if (src.startsWith('data:')) {
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.maxWidth = '100%';
    img.style.maxHeight = '100%';
    img.style.objectFit = 'contain';
    img.style.transform = 'none';
    return;
  }
  const fname = src.split('/').pop() || '';
  let scale = 1.3;
  if (/^mc/.test(fname)) scale = 1.55;         
  else if (/^cmt/.test(fname)) scale = 1.15;   
  else if (/^world/.test(fname)) scale = 1.3;  

  img.style.width = '100%';
  img.style.height = '100%';
  img.style.maxWidth = '100%';
  img.style.maxHeight = '100%';
  img.style.objectFit = 'contain';
  img.style.transform = `scale(${scale})`;
}

function mechImageFallback(img) {
  const parent = img.parentElement;
  if (parent) {
    parent.innerHTML = '<span style="color:var(--text-2); font-size:11px; padding:10px; text-align:center;">画像取得不可</span>';
  }
}

async function fetchMechDetail(url) {
  const res = await fetch(mechProxyUrl(url));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  return parseMechDetailText(text, url);
}

function parseMechDetailText(text, sourceUrl) {
  const lines = text.split('\n');
  const detail = {
    imageUrl: null,
    planes: null,        
    axes: null,           
    stations: null,
    vr: null,
    centroid: null,       
    moment: null          
  };

  let axesAzimuth = null; 
  let axesPlunge = null;  

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    const imgM = /!\[[^\]]*\]\((https?:\/\/[^\s)]+\.png)\)/.exec(line);
    if (imgM && !detail.imageUrl) detail.imageUrl = imgM[1];

    if (!line.includes('|')) continue;
    const cells = splitMdRow(line);

    if (!detail.centroid) {
      const timeM = /^(\d{4}年\d{2}月\d{2}日\d{2}時\d{2}分[\d.]+秒)$/.exec((cells[0] || '').trim());
      const latM = /北緯([\d.]+)度([\d.]+)分/.exec(cells[1] || '');
      const lonM = /東経([\d.]+)度([\d.]+)分/.exec(cells[2] || '');
      if (timeM && latM && lonM) {
        detail.centroid = {
          timeStr: timeM[1],
          lat: (parseFloat(latM[1]) + parseFloat(latM[2]) / 60).toFixed(3),
          lon: (parseFloat(lonM[1]) + parseFloat(lonM[2]) / 60).toFixed(3),
          depth: (cells[3] || '').trim(),
          mw: (cells[4] || '').trim()
        };
        continue;
      }
    }

    if (!detail.moment) {
      const prevCells = i > 0 && lines[i - 1].includes('|') ? splitMdRow(lines[i - 1]) : null;
      const isMomentHeader = prevCells && prevCells[0] === 'Mo' && prevCells[1] === 'Mrr';
      if (isMomentHeader && cells.length >= 10 && /^-?[\d.]+$/.test(cells[0])) {
        detail.moment = {
          mo: cells[0], mrr: cells[1], mtt: cells[2], mff: cells[3],
          mrt: cells[4], mrf: cells[5], mtf: cells[6],
          exponent: cells[7], unit: cells[8], nonDc: cells[9]
        };
        continue;
      }
    }

    if (cells[0] && cells[0].includes('断層面解')) {
      if (!detail.planes) detail.planes = [];
      detail.planes.push({
        label: cells[0],
        strike: cells[1], dip: cells[2], rake: cells[3]
      });
      if (cells.length >= 8) {
        if (cells[4] === '方位') {
          axesAzimuth = { p: cells[5], t: cells[6], n: cells[7] };
        } else if (cells[4] === '傾斜') {
          axesPlunge = { p: cells[5], t: cells[6], n: cells[7] };
        }
      }
    }

    if (cells.some(c => c.includes('観測点数'))) {
      const idx = cells.findIndex(c => c.includes('観測点数'));
      if (idx >= 0 && cells[idx + 1]) detail.stations = cells[idx + 1];
      const scoreIdx = cells.findIndex(c => c.includes('V.R.') || c === 'スコア');
      if (scoreIdx >= 0 && cells[scoreIdx + 1]) {
        detail.vr = cells[scoreIdx + 1];
        detail.vrLabel = cells[scoreIdx]; 
      }
    }
  }

  if (axesAzimuth || axesPlunge) {
    detail.axes = {
      p: { azimuth: axesAzimuth ? axesAzimuth.p : null, plunge: axesPlunge ? axesPlunge.p : null },
      t: { azimuth: axesAzimuth ? axesAzimuth.t : null, plunge: axesPlunge ? axesPlunge.t : null },
      n: { azimuth: axesAzimuth ? axesAzimuth.n : null, plunge: axesPlunge ? axesPlunge.n : null }
    };
  }

  if (!detail.imageUrl) {
    detail.imageUrl = mechFigImageUrl(sourceUrl);
  }
  return detail;
}

const USGS_FDSN_BASE = 'https://earthquake.usgs.gov/fdsnws/event/1/query';
const USGS_MIN_MAGNITUDE = 5.0;
const USGS_LOOKBACK_DAYS = 5;

function usgsQueryUrl(producttype) {
  const end = new Date();
  const start = new Date(end.getTime() - USGS_LOOKBACK_DAYS * 24 * 60 * 60 * 1000);
  const params = new URLSearchParams({
    format: 'geojson',
    starttime: start.toISOString(),
    endtime: end.toISOString(),
    minmagnitude: String(USGS_MIN_MAGNITUDE),
    producttype,
    orderby: 'time'
  });
  return `${USGS_FDSN_BASE}?${params.toString()}`;
}

async function fetchUsgsList() {
  const [fmRes, mtRes, imtRes] = await Promise.all([
    fetch(usgsQueryUrl('focal-mechanism')),
    fetch(usgsQueryUrl('moment-tensor')),
    fetch(usgsQueryUrl('internal-moment-tensor'))
  ]);
  const [fmData, mtData, imtData] = await Promise.all([
    fmRes.ok ? fmRes.json() : { features: [] },
    mtRes.ok ? mtRes.json() : { features: [] },
    imtRes.ok ? imtRes.json() : { features: [] }
  ]);

  const byId = new Map();
  for (const feat of fmData.features) {
    byId.set(feat.id, { feat, hasFocalMechanism: true, hasMomentTensor: false });
  }
  for (const feat of [...mtData.features, ...imtData.features]) {
    const existing = byId.get(feat.id);
    if (existing) existing.hasMomentTensor = true;
    else byId.set(feat.id, { feat, hasFocalMechanism: false, hasMomentTensor: true });
  }

  const rows = [];
  for (const { feat, hasFocalMechanism, hasMomentTensor } of byId.values()) {
    const p = feat.properties || {};
    const [lon, lat] = feat.geometry ? feat.geometry.coordinates : [null, null];
    if (lat == null || lon == null || p.mag == null) continue;

    const solutions = [];
    if (hasFocalMechanism) {
      solutions.push({ source: 'usgs', kind: 'focal-mechanism', label: 'USGS初動解', eventId: feat.id });
    }
    if (hasMomentTensor) {
      solutions.push({ source: 'usgs', kind: 'moment-tensor', label: 'USGS CMT', eventId: feat.id });
    }
    if (!solutions.length) continue;

    rows.push({
      source: 'usgs',
      eventId: feat.id,
      timeStr: formatUsgsTime(p.time),
      timeMs: p.time,
      lat, lon,
      depth: feat.geometry && feat.geometry.coordinates[2] != null ? `${feat.geometry.coordinates[2].toFixed(0)}km` : '不明',
      mag: p.mag,
      place: p.place || '不明',
      solutions
    });
  }
  return rows;
}

function formatUsgsTime(timeMs) {
  if (timeMs == null) return '不明';
  const d = new Date(timeMs);
  const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  const y = jst.getUTCFullYear();
  const mo = String(jst.getUTCMonth() + 1).padStart(2, '0');
  const day = String(jst.getUTCDate()).padStart(2, '0');
  const h = String(jst.getUTCHours()).padStart(2, '0');
  const mi = String(jst.getUTCMinutes()).padStart(2, '0');
  return `${y}年${mo}月${day}日${h}時${mi}分頃`;
}

function buildUsgsDetail(feat, kind) {
  const products = (feat.properties && feat.properties.products) || {};
  let prod = (products[kind] && products[kind][0]) || null;
  if (!prod && kind === 'moment-tensor') {
    prod = (products['internal-moment-tensor'] && products['internal-moment-tensor'][0]) || null;
  }
  const pr = (prod && prod.properties) || {};

  const detail = {
    imageUrl: null,
    planes: null,
    axes: null,
    stations: pr['num-stations-used'] || null,
    vr: null,
    vrLabel: 'DC比',
    centroid: null,
    moment: null,
    sourceLabel: 'USGS',
    externalUrl: (feat.properties && feat.properties.url) || null
  };

  const np1 = { label: '断層面解１', strike: pr['nodal-plane-1-strike'], dip: pr['nodal-plane-1-dip'], rake: pr['nodal-plane-1-rake'] };
  const np2 = { label: '断層面解２', strike: pr['nodal-plane-2-strike'], dip: pr['nodal-plane-2-dip'], rake: pr['nodal-plane-2-rake'] };
  if (np1.strike != null || np2.strike != null) {
    detail.planes = [np1, np2];
    try {
      detail.imageUrl = renderBeachballDataUrl(
        parseFloat(np1.strike), parseFloat(np1.dip), parseFloat(np1.rake), 260
      );
    } catch (e) {
      detail.imageUrl = null;
    }
  }

  if (pr['percent-double-couple'] != null) {
    const dcPct = Math.round(parseFloat(pr['percent-double-couple']) * 100);
    detail.vr = `${dcPct}%`;
  }

  if (pr['t-axis-azimuth'] != null || pr['p-axis-azimuth'] != null) {
    detail.axes = {
      p: { azimuth: pr['p-axis-azimuth'], plunge: pr['p-axis-plunge'] },
      t: { azimuth: pr['t-axis-azimuth'], plunge: pr['t-axis-plunge'] },
      n: { azimuth: pr['n-axis-azimuth'], plunge: pr['n-axis-plunge'] }
    };
  }

  if (pr['derived-magnitude'] || pr['scalar-moment']) {
    const moRaw = parseFloat(pr['scalar-moment']);
    let mantissa = moRaw, exponent = 0;
    if (isFinite(moRaw) && moRaw > 0) {
      exponent = Math.floor(Math.log10(moRaw));
      mantissa = (moRaw / Math.pow(10, exponent)).toFixed(2);
    }
    detail.moment = {
      mo: isFinite(mantissa) ? String(mantissa) : (pr['scalar-moment'] || '—'),
      exponent: String(exponent),
      unit: 'Nm',
      mrr: pr['tensor-mrr'] ?? '—', mtt: pr['tensor-mtt'] ?? '—', mff: pr['tensor-mpp'] ?? '—',
      mrt: pr['tensor-mrt'] ?? '—', mrf: pr['tensor-mrp'] ?? '—', mtf: pr['tensor-mtp'] ?? '—',
      nonDc: pr['percent-double-couple'] ? `${(100 - Math.round(parseFloat(pr['percent-double-couple']) * 100))}%` : '—'
    };
  }

  if (pr['derived-latitude'] != null && pr['derived-longitude'] != null) {
    detail.centroid = {
      timeStr: pr['derived-eventtime'] ? formatUsgsTime(Date.parse(pr['derived-eventtime'])) : (feat.properties.time ? formatUsgsTime(feat.properties.time) : '不明'),
      lat: Number(pr['derived-latitude']).toFixed(3),
      lon: Number(pr['derived-longitude']).toFixed(3),
      depth: pr['derived-depth'] ? `${Math.round(parseFloat(pr['derived-depth']))}km` : '不明',
      mw: pr['derived-magnitude'] || (feat.properties.mag != null ? feat.properties.mag.toFixed(1) : '—')
    };
  }

  return detail;
}

async function fetchUsgsDetail(eventId, kind) {
  const url = `${USGS_FDSN_BASE}?eventid=${encodeURIComponent(eventId)}&format=geojson`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const feat = await res.json();
  return buildUsgsDetail(feat, kind);
}

const MECH_MERGE_TIME_TOLERANCE_MS = 120 * 1000;
const MECH_MERGE_DISTANCE_KM = 300;

function mergeMechRows(jmaRows, usgsRows) {
  const usedUsgsIdx = new Set();
  const merged = jmaRows.map(jr => {
    if (jr.timeMs == null) return jr;
    let bestIdx = -1, bestDist = Infinity;
    usgsRows.forEach((ur, i) => {
      if (usedUsgsIdx.has(i)) return;
      if (ur.timeMs == null) return;
      const dt = Math.abs(ur.timeMs - jr.timeMs);
      if (dt > MECH_MERGE_TIME_TOLERANCE_MS) return;
      const dist = haversineKm(jr.lat, jr.lon, ur.lat, ur.lon);
      if (dist > MECH_MERGE_DISTANCE_KM) return;
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    });
    if (bestIdx === -1) return jr;

    usedUsgsIdx.add(bestIdx);
    const ur = usgsRows[bestIdx];
    return {
      ...jr,
      mergedFrom: ['jma', 'usgs'],
      solutions: [...jr.solutions, ...ur.solutions]
    };
  });

  usgsRows.forEach((ur, i) => {
    if (!usedUsgsIdx.has(i)) merged.push(ur);
  });

  merged.sort((a, b) => (b.timeMs ?? 0) - (a.timeMs ?? 0));
  return merged;
}

async function loadMechDetailBody(solution) {
  const bodyEl = document.getElementById('mech-detail-body');
  if (!bodyEl) return;
  const cacheKey = solution.source === 'jma' ? solution.url : `usgs:${solution.eventId}:${solution.kind}`;
  bodyEl.innerHTML = `<div class="status-text"><span class="spinner"></span> ${solution.label}を読み込み中...</div>`;
  try {
    let detail = mechState.detailCache.get(cacheKey);
    if (!detail) {
      if (solution.source === 'jma') {
        detail = await fetchMechDetail(solution.url);
      } else {
        detail = await fetchUsgsDetail(solution.eventId, solution.kind);
      }
      mechState.detailCache.set(cacheKey, detail);
    }
    renderMechDetailBody(bodyEl, detail, solution);
  } catch (e) {
    console.error(e);
    const fallbackUrl = solution.source === 'jma' ? solution.url : `https://earthquake.usgs.gov/earthquakes/eventpage/${solution.eventId}/moment-tensor`;
    const fallbackLabel = solution.source === 'jma' ? '気象庁ページで直接見る' : 'USGSページで直接見る';
    bodyEl.innerHTML = `
      <span style="color:var(--danger); font-size:12px;">詳細の取得に失敗しました: ${e.message}</span>
      <div style="margin-top:8px; text-align:center;">
        <a href="${fallbackUrl}" target="_blank" rel="noopener" class="btn btn-sm" style="text-decoration:none;">${fallbackLabel} ↗</a>
      </div>
    `;
  }
}

      <div class="mech-list-col">
        <div class="glass-panel" style="padding:18px;">
          <div class="panel-title"><span class="bar"></span>震源球 — 主な地震の発震機構解（速報値・JMA直近5日間 / USGS世界全体 M${USGS_MIN_MAGNITUDE}+）</div>
          <div class="status-text" id="mech-status"><span class="spinner"></span> データを取得中...</div>
          <div id="mech-list"></div>
        </div>
      </div>
      <div class="mech-detail-col" id="mech-detail-col">
        <div class="glass-panel" style="min-height:100%;">
          <div class="mech-detail-placeholder">リストからイベントを選択してください</div>
        </div>
      </div>
    </div>
  `;

  const statusEl = document.getElementById('mech-status');

  const [jmaResult, usgsResult] = await Promise.allSettled([
    fetchMechList(),
    fetchUsgsList()
  ]);

  const jmaRows = jmaResult.status === 'fulfilled' ? jmaResult.value : [];
  const usgsRows = usgsResult.status === 'fulfilled' ? usgsResult.value : [];

  if (jmaResult.status === 'rejected') console.error('JMA一覧取得失敗:', jmaResult.reason);
  if (usgsResult.status === 'rejected') console.error('USGS一覧取得失敗:', usgsResult.reason);

  const rows = mergeMechRows(jmaRows, usgsRows);

  if (rows.length === 0) {
    statusEl.innerHTML = `<span style="color:var(--danger);">データを取得できませんでした（JMA/USGSとも失敗、またはページ構造が変更された可能性があります）</span>
      <div style="margin-top:8px;"><a href="https://www.data.jma.go.jp/eew/data/mech/top.html" target="_blank" rel="noopener" class="btn btn-sm" style="text-decoration:none;">気象庁ページを直接開く ↗</a></div>`;
    return;
  }

  const mergedCount = rows.filter(r => r.mergedFrom).length;
  const failNote = (jmaResult.status === 'rejected' ? 'JMA取得失敗 ' : '') + (usgsResult.status === 'rejected' ? 'USGS取得失敗' : '');
  statusEl.innerHTML = `${rows.length}件のイベントを取得（うちJMA・USGS統合 ${mergedCount}件）` + (failNote ? ` <span style="color:var(--danger);">／ ${failNote}</span>` : '');
  mechState.rows = rows;
  renderMechList();
}

loadEpinameData(); 
initSharedMap();
initMechView();

</script>
</body>
</html>
